name: 금융 대시보드 업데이트

on:
  schedule:
    # UTC 기준. KST = UTC+9.
    # 데이터 갱신: 매시간 정각 (메일과 무관, data.json만 갱신)
    - cron: "0 * * * *"
  repository_dispatch:
    # 외부 스케줄러(cron-job.org)가 매일 정오에 깨우는 트리거. event_type: send_email
    # 메일 발송은 오직 이 경로로만 일어난다.
    types: [send_email]
  workflow_dispatch:   # 수동 실행 버튼
    inputs:
      send_test_email:
        description: "테스트 메일 보내기 (체크하면 즉시 발송)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 데이터 수집
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: data.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "데이터 갱신: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: 메일 발송 (cron-job.org 호출 또는 테스트 체크 시)
        if: github.event_name == 'repository_dispatch' || github.event.inputs.send_test_email == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          IS_TEST:   ${{ github.event.inputs.send_test_email }}
        run: python scripts/send_email.py

      - name: 발송 기록 커밋 (중복 방지용)
        if: github.event_name == 'repository_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_email.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "발송 기록 변경 없음"
          else
            git commit -m "메일 발송 기록: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
