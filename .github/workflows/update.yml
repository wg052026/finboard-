name: 금융 대시보드 업데이트

on:
  schedule:
    # UTC 기준. KST = UTC+9.
    # 데이터 갱신: 매시간 정각
    - cron: "0 * * * *"
    # 백업용 메일 발송: UTC 03:10 = KST 12:10 (외부 트리거 실패 시 대비)
    - cron: "10 3 * * *"
  repository_dispatch:
    # 외부 스케줄러(cron-job.org)가 깨우는 트리거. event_type: send_email
    types: [send_email]
  workflow_dispatch:   # 수동 실행 버튼
    inputs:
      send_test_email:
        description: "테스트 메일 보내기 (체크하면 즉시 발송)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 데이터 수집
        run: python scripts/fetch_data.py

      - name: data.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "데이터 갱신: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: 메일 발송 (정오 스케줄 또는 테스트 체크 시)
        if: github.event_name == 'repository_dispatch' || github.event.schedule == '10 3 * * *' || github.event.inputs.send_test_email == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          IS_TEST:   ${{ github.event.inputs.send_test_email }}
        run: python scripts/send_email.py
